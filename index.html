<!DOCTYPE html>
<html langmeta charset="UTF-8" /><html lang="zh-Hant">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AIA Alien Slang Quiz</title>

  <!-- ✅ 正確的 Google Font -->
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap"
    rel="stylesheet"
  />

  <style>
    * {
      box-sizing: border-box;
      font-family: "Noto Sans TC", "Segoe UI", sans-serif;
    }

    body {
      margin: 0;
      background: #fff;
    }

    /* ===== Layout ===== */
    .layout {
      display: flex;
      min-height: 100vh;
    }

    /* ===== Cover ===== */
    .cover {
      width: 55%;
      background: #C8102E;
      color: #fff;
      padding: 64px;
      position: relative;

      /* ✅ 封面文字整體置中 */
      text-align: center;
    }

    .cover h1 {
      font-size: 42px;
      line-height: 1.15;
      margin-top: 120px;
      margin-bottom: 10px;
      font-weight: 700;
      color: #ffffff;
    }

    /* ✅ 品牌化後的副標（修正顏色＋置中） */
    .cover-subtitle {
      font-size: 26px;
      font-weight: 400;
      line-height: 1.3;
      letter-spacing: 0.06em;
      margin: 0;

      /* ✅ 關鍵修正 */
      color: #ffffff;      /* 原本的白色 */
      opacity: 1;          /* 移除灰化效果 */
    }

    .footer {
      position: absolute;
      bottom: 24px;
      left: 0;
      right: 0;
      font-size: 10px;
      opacity: 0.8;
      text-align: center;
    }

    /* ===== Right ===== */
    .right {
      width: 45%;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      padding: 48px;
      position: relative;
    }

    .geo {
      position: absolute;
      left: -120px;
      top: 140px;
      width: 520px;
      height: 420px;
      background: rgba(244,163,181,0.6);
      clip-path: polygon(0 100%, 50% 0, 100% 100%);
    }

    /* ===== Card ===== */
    .card {
      width: 420px;
      background: #fff;
      border-radius: 20px;
      padding: 32px;
      box-shadow: 0 16px 40px rgba(0,0,0,0.08);
      display: flex;
      flex-direction: column;
      gap: 20px;
      z-index: 1;
    }

    .progress {
      display: flex;
      gap: 12px;
      font-size: 12px;
      color: #6B7280;
    }

    .progress-bar {
      flex: 1;
      height: 6px;
      background: #E5E7EB;
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-bar span {
      display: block;
      height: 100%;
      background: #9CA3AF;
    }

    .tag {
      font-size: 12px;
      color: #2563EB;
      font-weight: 700;
      letter-spacing: 0.15em;
    }

    h2 {
      margin: 0;
      font-size: 28px;
      color: #111827;
    }

    input {
      height: 48px;
      border-radius: 14px;
      border: 1px solid #D1D5DB;
      padding: 0 14px;
      font-size: 16px;
    }

    input.error {
      border-color: #DC2626;
    }

    .error-msg {
      display: none;
      font-size: 13px;
      color: #DC2626;
    }

    button {
      align-self: flex-end;
      padding: 10px 26px;
      border-radius: 999px;
      background: #111;
      color: #fff;
      border: none;
      cursor: pointer;
      font-size: 14px;
    }

    /* ===== RWD ===== */
    @media (max-width: 1023px) {
      .layout {
        flex-direction: column;
      }
      .cover,
      .right {
        width: 100%;
      }
      .geo {
        display: none;
      }
      .cover h1 {
        margin-top: 40px;
      }
    }

    @media (max-width: 480px) {
      .cover h1 {
        font-size: 34px;
      }
      .cover-subtitle {
        font-size: 22px;
      }
    }
  </style>
</head>

<body>
<div class="layout">

  <!-- Cover -->
  <section class="cover">
    <h1>MKT 雙月會</h1>
    <h2 class="cover-subtitle">Z世代網路梗語</h2>

    <div class="footer">
      AIA confidential and proprietary information. Not for distribution.
    </div>
  </section>

  <!-- Quiz -->
  <section class="right">
    <div class="geo"></div>
    <div id="app" class="card"></div>
  </section>

</div>

<script>
  const questions = [
    { q: "高麗菜煮蛋那桌", a: "生活智慧高、聰明解決小事" },
    { q: "估咩", a: "Google Maps" },
    { q: "泉", a: "吹牛" },
    { q: "蛋雕", a: "丟掉" },
    { q: "dddd", a: "懂的都懂" },
    { q: "VEN / VENTY", a: "問（wèn）" },
    { q: "M3", a: "Do you know what I'm saying?" }
  ];

  let step = 0;
  const answers = Array(questions.length).fill("");
  const app = document.getElementById("app");

  function render() {
    if (step === questions.length) {
      renderResult();
      return;
    }

    app.innerHTML = `
      <div class="progress">
        <div class="progress-bar">
          <span style="width:${((step + 1) / questions.length) * 100}%"></span>
        </div>
        <span>${step + 1} / ${questions.length}</span>
      </div>

      <div class="tag">ALIEN SLANG</div>
      <h2>${questions[step].q}</h2>

      <input id="answerInput" placeholder="請輸入你的答案" value="${answers[step]}" />
      <div class="error-msg" id="errorMsg">此題為必填</div>

      <button onclick="next()">下一題</button>
    `;
  }

  function next() {
    const input = document.getElementById("answerInput");
    const error = document.getElementById("errorMsg");

    if (!input || input.value.trim() === "") {
      input.classList.add("error");
      error.style.display = "block";
      return;
    }

    answers[step] = input.value.trim();
    step++;
    render();
  }

  function renderResult() {
    app.innerHTML = "<h2>答案揭曉</h2>";
    questions.forEach((q, i) => {
      app.innerHTML += `
        <p>
          <strong>${q.q}</strong><br>
          你的答案：${answers[i]}<br>
          正確答案：${q.a}
        </p>
      `;
    });
  }

  render();
</script>
</body>
</html>
