<!DOCTYPE html>
><html lang="zh-Hant">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AIA Alien Slang Quiz</title>

  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap"
    rel="stylesheet"
  />

  <style>
    * {
      box-sizing: border-box;
      font-family: "Noto Sans TC", "Segoe UI", sans-serif;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: #fff;
      overflow-y: auto;
    }

    /* ===== Desktop ===== */
    .layout {
      display: flex;
      min-height: 100vh;
    }

    .cover {
      width: 55%;
      background: #C8102E;
      color: #fff;
      padding: 64px;
      text-align: center;
    }

    .cover h1 {
      font-size: 42px;
      margin-top: 100px;
      margin-bottom: 8px;
    }

    .cover-subtitle {
      font-size: 26px;
      letter-spacing: 0.06em;
    }

    .footer {
      margin-top: 40px;
      font-size: 10px;
      opacity: 0.8;
    }

    .right {
      width: 45%;
      padding: 48px;
    }

    .card {
      width: 420px;
      max-width: 100%;
      margin-left: auto;
      background: #fff;
      border-radius: 20px;
      padding: 32px;
      box-shadow: 0 16px 40px rgba(0,0,0,0.08);
    }

    .progress {
      display: flex;
      gap: 12px;
      font-size: 12px;
      color: #6B7280;
      align-items: center;
    }

    .progress-bar {
      flex: 1;
      height: 6px;
      background: #E5E7EB;
      border-radius: 999px;
    }

    .progress-bar span {
      display: block;
      height: 100%;
      background: #9CA3AF;
    }

    .tag {
      margin-top: 16px;
      font-size: 12px;
      color: #2563EB;
      font-weight: 700;
      letter-spacing: 0.15em;
    }

    h2 {
      margin: 12px 0;
      font-size: 28px;
    }

    input {
      width: 100%;
      height: 48px;
      margin-top: 16px;
      border-radius: 14px;
      border: 1px solid #D1D5DB;
      padding: 0 14px;
      font-size: 16px;
    }

    input.error {
      border-color: #DC2626;
    }

    .error-msg {
      margin-top: 8px;
      font-size: 13px;
      color: #DC2626;
      display: none;
    }

    button {
      margin-top: 20px;
      float: right;
      padding: 10px 26px;
      border-radius: 999px;
      background: #111;
      color: #fff;
      border: none;
      cursor: pointer;
    }

    /* ===== Mobile（iOS 穩定） ===== */
    @media (max-width: 1023px) {
      .layout {
        display: block;
      }

      .cover,
      .right {
        width: 100%;
      }

      .cover {
        padding: 32px 20px;
      }

      .cover h1 {
        font-size: 32px;
        margin-top: 20px;
      }

      .cover-subtitle {
        font-size: 22px;
      }

      .card {
        width: 100%;
        margin: 0;
      }
    }
  </style>
</head>

<body>
<div class="layout">

  <section class="cover">
    <h1>MKT 雙月會</h1>
    <div class="cover-subtitle">Z世代網路梗語</div>
    <div class="footer">
      AIA confidential and proprietary information. Not for distribution.
    </div>
  </section>

  <section class="right">
    <div id="app" class="card"></div>
  </section>

</div>

<script>
  const questions = [
    { q: "高麗菜煮蛋那桌", a: "生活智慧高、聰明解決小事" },
    { q: "估咩", a: "Google Maps" },
    { q: "泉", a: "吹牛" },
    { q: "蛋雕", a: "丟掉" },
    { q: "dddd", a: "懂的都懂" },
    { q: "VEN / VENTY", a: "問（wèn）" },
    { q: "M3", a: "Do you know what I'm saying?" }
  ];

  let step = 0;
  const answers = [];
  const app = document.getElementById("app");

  function render() {
    if (step === questions.length) return renderResult();

    app.innerHTML = `
      <div class="progress">
        <div class="progress-bar">
          <span style="width:${((step+1)/questions.length)*100}%"></span>
        </div>
        <span>${step+1} / ${questions.length}</span>
      </div>

      <div class="tag">ALIEN SLANG</div>
      <h2>${questions[step].q}</h2>

      <input id="answer" placeholder="請輸入你的答案" value="${answers[step]||""}">
      <div class="error-msg" id="errorMsg">此題為必填</div>

      <button onclick="next()">下一題</button>
    `;
  }

  function next() {
    const input = document.getElementById("answer");
    const error = document.getElementById("errorMsg");
    const val = input.value.trim();

    if (!val) {
      input.classList.add("error");
      error.style.display = "block";
      return;
    }

    input.classList.remove("error");
    error.style.display = "none";

    answers[step] = val;
    step++;
    render();
  }

  function renderResult() {
    app.innerHTML = "<h2>答案揭曉</h2>";
    questions.forEach((q, i) => {
      app.innerHTML += `
        <p>
          <strong>${q.q}</strong><br>
          你的答案：${answers[i]}<br>
          正確答案：${q.a}
        </p>
      `;
    });
  }

  render();
</script>
</body>
</html>
